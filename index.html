<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-nhLUSdpT6ViBEOyckFVH5HF6mpK61JW63mi0HFTXUmo=' 'sha256-jESD/E0Q3tlKfu48hDqc9Iq+UbKAlmrA314nlkaIR8E=' https://static.cloudflareinsights.com; script-src-elem 'self' 'sha256-nhLUSdpT6ViBEOyckFVH5HF6mpK61JW63mi0HFTXUmo=' 'sha256-jESD/E0Q3tlKfu48hDqc9Iq+UbKAlmrA314nlkaIR8E=' https://static.cloudflareinsights.com; style-src 'self'; img-src 'self'; connect-src 'self' https://cloudflareinsights.com https://www.davidbreyer.com; font-src 'none'; media-src 'none'; object-src 'none'; frame-src 'none'; worker-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
    <title>Format Lizard</title>
    <link rel="icon" type="image/png" href="assets/apple-icon.png?v=20260609-2336">
    <link rel="apple-touch-icon" href="assets/apple-icon.png?v=20260609-2336">
    <link rel="stylesheet" href="styles.css?v=20260609-2336">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-lockup">
          <img src="assets/yelling-lizard-logo.png?v=20260609-2336" alt="" class="brand-logo" width="72" height="72">
          <div>
            <p class="eyebrow">JSON + XML + YAML + CSS formatter</p>
            <h1>Format Lizard</h1>
          </div>
        </div>
        <div class="action-bar" aria-label="Formatter actions">
          <details class="tools-menu">
            <summary>Tools</summary>
            <div class="tools-menu-list">
              <a href="https://davidbreyer.github.io/format-lizard/" aria-current="page">Format Lizard</a>
              <a href="https://davidbreyer.github.io/compare-lizard/">Compare Lizard</a>
            </div>
          </details>
          <button id="openButton" type="button">Open</button>
          <button id="formatButton" type="button" class="primary-button">Format</button>
          <button id="minifyButton" type="button">Minify</button>
          <button id="copyButton" type="button">Copy</button>
          <button id="saveButton" type="button">Save</button>
          <button id="clearButton" type="button" class="ghost-button">Clear</button>
          <input id="fileInput" class="file-input" type="file" accept=".json,.xml,.config,.yaml,.yml,.css,.txt,application/json,application/xml,text/xml,application/yaml,text/yaml,text/css,text/plain">
        </div>
      </header>

      <section class="control-panel" aria-label="Formatter controls">
        <div class="control-group">
          <span class="control-group-title">Settings</span>
          <div class="control-row">
            <label class="field-label" for="format">Format</label>
            <select id="format">
              <option value="json">JSON</option>
              <option value="xml">XML</option>
              <option value="yaml">YAML</option>
              <option value="css">CSS</option>
            </select>

            <label class="field-label" for="indent">Indent</label>
            <select id="indent">
              <option value="2">2 spaces</option>
              <option value="4">4 spaces</option>
              <option value="tab">Tab</option>
            </select>
          </div>
        </div>

        <div class="control-group">
          <span class="control-group-title">JSON tools</span>
          <div class="control-row">
            <label class="checkbox-control" for="sortKeys">
              <input id="sortKeys" type="checkbox">
              <span>Sort keys</span>
            </label>
            <button id="unescapeButton" type="button">Unescape</button>
            <button id="jsonToXmlButton" type="button">To XML</button>
          </div>
        </div>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="status" class="status-pill status-idle">Ready</div>
        <div id="stats" class="stats">0 chars</div>
      </section>

      <section class="editor-grid" aria-label="Formatter editors">
        <div class="editor-pane">
          <div class="pane-header">
            <label for="sourceInput">Input</label>
            <span id="inputCount">0 chars</span>
          </div>
          <textarea
            id="sourceInput"
            spellcheck="false"
            placeholder='{"name":"Ada","tools":["logic","tea"],"ready":true}'
            aria-label="Unformatted input"
          ></textarea>
        </div>

        <div class="editor-pane">
          <div class="pane-header">
            <label for="formattedOutput">Output</label>
            <div class="pane-tools">
              <div id="treeActions" class="tree-actions is-hidden" aria-label="Tree controls" aria-hidden="true">
                <button id="expandTreeButton" class="icon-button" type="button" aria-label="Expand all tree nodes" title="Expand all" disabled>
                  <span aria-hidden="true">+</span>
                </button>
                <button id="collapseTreeButton" class="icon-button" type="button" aria-label="Collapse all tree nodes" title="Collapse all" disabled>
                  <span aria-hidden="true">-</span>
                </button>
              </div>
              <div class="view-tabs" aria-label="Output view">
                <button id="textViewButton" class="view-tab active" type="button" aria-pressed="true">Text</button>
                <button id="treeViewButton" class="view-tab" type="button" aria-pressed="false" disabled>Tree</button>
              </div>
              <span id="outputCount">0 chars</span>
            </div>
          </div>
          <textarea
            id="formattedOutput"
            class="output-view"
            spellcheck="false"
            readonly
            placeholder="Formatted output will appear here"
            aria-label="Formatted output"
          ></textarea>
          <div id="treeOutput" class="tree-output output-view hidden" aria-label="JSON tree output"></div>
        </div>
      </section>

      <footer class="app-footer">
        <span>Ready for tidy data.</span>
        <span>
          <a href="https://github.com/davidbreyer/format-lizard" target="_blank" rel="noreferrer">GitHub</a>
          <span id="releaseStamp" data-version>Version: 20260609-2336</span>
        </span>
      </footer>
    </main>

    <script src="script.js?v=20260609-2336"></script>
  </body>
</html>
